version: 2
updates:
  # Keep the GitHub Actions used in workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # One PR per week bundling all action bumps, instead of one PR per action
      github-actions:
        patterns: ["*"]

  # Keep Rust dependencies up to date; complements the cargo-audit CI job
  # (audit only warns, Dependabot opens the actual bump PRs)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # One grouped PR per week instead of one per crate
      cargo:
        patterns: ["*"]

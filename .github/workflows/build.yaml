name: Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - run: cargo test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Scans Cargo.lock against the RUSTSEC advisory database, failing on
      # known-vulnerable dependency versions; ignored advisories (with
      # rationale) live in .cargo/audit.toml. We run cargo-audit directly
      # rather than rustsec/audit-check so the job needs no checks:write token
      # (the default token is read-only) and avoids the deprecated Node 20
      # action runtime.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  build-image:
    needs: test
    # Also runs on PRs (build only, no push) so image breakage — e.g. a
    # builder/runtime base mismatch — is caught before merge
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          # PRs only build; pushes to main and v* tags also publish
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: build-image
    # Only on version tags, after the image is published
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Print lines between this version's "## [x.y.z]" header and the next
          # "## [" header. substr matching avoids regex-escaping pitfalls.
          awk -v start="## [$version]" '
            substr($0, 1, length(start)) == start { flag = 1; next }
            flag && substr($0, 1, 4) == "## [" { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag


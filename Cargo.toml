[package]
name = "unified-api"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
dashmap = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "9", features = ["axum"] }

# [dev-dependencies] = solo se compilan para tests, no van al binario de producción
[dev-dependencies]
tempfile = "3"
tower = "0.5"            # para llamar al app como servicio (sin TCP)
http-body-util = "0.1"   # para leer el body de las respuestas

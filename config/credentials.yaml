cred-device42-api:
  name: "Device42 API"
  type: "username_password"
  vault_path: "secret/data/unified-api/device42"
  vault_keys:
    username: "username"
    password: "password"

cred-github-token:
  name: "GitHub Token"
  type: "token"
  vault_path: "secret/data/unified-api/github"
  vault_keys:
    token: "token"

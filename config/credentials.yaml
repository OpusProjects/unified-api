cred-section9-api:
  name: "Section 9 API"
  type: "username_password"
  env_prefix: "SECTION9"
  secret_keys:
    username: "USERNAME"
    password: "PASSWORD"

cred-github-token:
  name: "GitHub Token"
  type: "token"
  env_prefix: "GITHUB"
  secret_keys:
    token: "TOKEN"

cred-ssh-infra:
  name: "SSH Infrastructure"
  type: "ssh_key"
  env_prefix: "INFRA_SSH"
  secret_keys:
    username: "USERNAME"
  file_keys:
    ssh_key: "/run/secrets/infra-ssh/id_rsa"
    ca_cert: "/run/secrets/infra-ssh/ca.pem"

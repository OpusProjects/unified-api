src-section9:
  name: "Section 9 Inventory"
  project_id: "prj-connectors-infra"
  script_path: "test-connectors/fake_inventory.py"
  credential_ids: ["cred-section9-api"]
  schedule: "0 */1 * * *"
  sync_interval_seconds: 60
  ttl_seconds: 3600
  ttl_overrides:
    groups:
      production: 900
    hosts:
      motoko.section9.net: 300

src-infra:
  name: "Infrastructure Data"
  project_id: "prj-connectors-infra"
  script_path: "test-connectors/fake_infra.py"
  credential_ids: []
  sync_interval_seconds: 300
  ttl_seconds: 3600
  sync_mode: "replace"

src-section9-large:
  name: "Section 9 Large Inventory"
  project_id: "prj-connectors-infra"
  script_path: "test-connectors/fake_inventory.py"
  credential_ids: []
  schedule: "0 */2 * * *"
  sync_interval_seconds: 120
  ttl_seconds: 7200
  config:
    scenario: "large"

src-ssh-example:
  name: "SSH Facts Gathering"
  connector_type: "ssh"
  project_id: "prj-connectors-infra"
  script_path: "gather_facts"
  credential_ids: ["cred-ssh-infra"]
  sync_interval_seconds: 300
  ttl_seconds: 600
  config:
    hosts: "host1.example.com,host2.example.com"
    port: "22"
    concurrency: "50"
    ssh_connect_timeout_seconds: "30"
    gather_mode: "facts"
    fact_path: "/etc/ansible/facts.d"
